url: https://chenchenzi.github.io/citationtone_hub/

template:
  bootstrap: 5
  bootswatch: minty           # match the running Shiny app's bslib theme
  bslib:
    primary: "#78c2ad"
    border-radius: 0.4rem

home:
  title: shinytone — A Citation Tone Research Hub
  description: >
    Interactive Shiny app and accompanying R functions for citation tone
    research across tone languages.

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]
  components:
    intro:
      text: Get started
      href: articles/shinytone.html

reference:
  - title: Launch the app
    desc: >
      Run the bundled Shiny UI locally — same interface as the hosted
      version, no upload limits, recordings stay on your machine.
    contents:
      - run_app

  - title: Normalisation
    desc: >
      By-speaker semitone or z-score f0 normalisation, plus landmark-based
      time normalisation for multisyllabic words.
    contents:
      - normalise_f0
      - normalise_time_landmarks
      - normalise_time_token

  - title: TextGrid landmarks
    desc: >
      Read interval tiers from Praat TextGrids and attach per-frame segment
      labels and boundaries (e.g. syllables) to long-format f0 data.
    contents:
      - tg_interval_tiers
      - assign_tier_landmarks
      - attach_landmarks

  - title: Outlier and artefact inspection
    desc: >
      Token-level outlier detection by speaker z-score and by
      speaker x tone level, plus sample-level pitch-tracking artefacts
      and a low-intensity check (Sundberg 1973, Steffman & Cole 2022).
    contents:
      - inspect_f0
      - flag_outliers
      - flag_level_outliers
      - flag_low_intensity
      - flag_pitch_jumps

  - title: Contour clustering
    desc: >
      Unsupervised grouping of tokens by f0-contour shape to discover
      candidate tone categories when the number of tones is unknown
      (Kaland 2023), with feature extraction and a choice of how many groups.
    contents:
      - cluster_f0
      - cluster_features
      - choose_k_f0
      - cluster_mdl
      - cluster_agreement

  - title: Sonification
    desc: >
      Render an f0 contour as an audible waveform (pure tone, complex tone, or a
      source-filter synthesised vowel) so prototypical tones can be heard, not
      only seen.
    contents:
      - sonify_f0

  - title: Curate tone labels
    desc: >
      Re-label tone-category variants or exclude tokens, without overwriting
      the original labels.
    contents:
      - apply_relabels

  - title: Contour modelling
    desc: >
      Token-level polynomial fits, mixed-effects growth-curve analysis,
      and GAMMs over tone contours, with AR1 correction and
      model-checking diagnostics.
    contents:
      - fit_polynomial
      - fit_gca
      - predict_gca
      - fit_gamm
      - predict_gamm
      - diagnose_gamm

  - title: Chao tone numerals
    desc: >
      Convert mean or predicted contours into Chao tone numerals
      (reference-line, interval-based, robust FOR methods).
    contents:
      - compute_mean_contour
      - contour_to_chao
      - classify_contour

  - title: Bundled data
    desc: A small citation-tone corpus that ships with the package for
      examples, vignettes, and the Shiny app's "Try with our sample data"
      button.
    contents:
      - sample_f0

  - title: Package overview
    contents:
      - shinytone-package

articles:
  - title: Tutorials
    contents:
      - shinytone

news:
  releases:
    - text: All release notes
      href: news/index.html

# Per-author display tweaks: linked names, no "Developed by" prefix.
authors:
  Chenzi Xu:
    href: https://chenzixu.rbind.io/
  Cong Zhang:
    href: https://congzhang-linguist.github.io

footer:
  structure:
    left:  authors_line
    right: built_with
  components:
    authors_line: "[Chenzi Xu](https://chenzixu.rbind.io/), [Cong Zhang](https://congzhang-linguist.github.io)"
